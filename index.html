<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Assinaturas — Contclaro</title>
<link href="https://fonts.googleapis.com/css2?family=Genos:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f0f;
  --surface:#0f1a1a;
  --surface2:#0d1616;
  --border:#1c2c2c;
  --text:#e0ecec;
  --muted:#5a7a7a;
  --accent:#3669DE;
  --gold:#A7A967;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px}
header{text-align:center;margin-bottom:48px}
header h1{font-family:'Genos',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.5px}
header p{color:var(--muted);font-size:13px;margin-top:6px}
.nav{display:flex;gap:12px;justify-content:center;margin-bottom:40px}
.nav-btn{padding:9px 22px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.nav-btn:hover{border-color:var(--accent);color:var(--text)}
.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.container{width:100%;max-width:820px;display:flex;flex-direction:column;gap:24px}
.page{display:none}.page.active{display:flex;flex-direction:column;gap:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:18px}
.tabs{display:flex;gap:8px;margin-bottom:24px}
.tab{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active-sbc{background:var(--accent);border-color:var(--accent);color:#fff}
.tab.active-prime{background:var(--gold);border-color:var(--gold);color:#0E161F}
.tab.active-select{background:var(--accent);border-color:var(--accent);color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted)}
input{background:#060e0e;border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;transition:border-color .2s;outline:none}
input:focus{border-color:var(--accent)}
input::placeholder{color:#2e4a4a}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.toggle{width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0}
.toggle::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(16px)}
.toggle-label{font-size:13px;color:var(--muted)}
.btn-gen{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Genos',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px;letter-spacing:.3px}
.btn-gen:hover{opacity:.88}
.btn-gen:active{transform:scale(.99)}
.preview-area{display:none;flex-direction:column;gap:16px}
.preview-area.visible{display:flex}
.preview-wrap{border-radius:10px;overflow:auto;border:1px solid var(--border);padding:20px;background:#111}
.btn-row{display:flex;gap:10px}
.btn-sec{flex:1;padding:11px;background:transparent;border:1px solid var(--border);color:var(--text);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.btn-png{flex:1;padding:11px;background:var(--accent);border:1px solid var(--accent);color:#fff;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-png:hover{opacity:.88}
.btn-png:disabled{opacity:.5;cursor:wait}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#0f2020;border:1px solid var(--accent);color:var(--text);padding:9px 22px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
/* History */
.history-empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 0}
.history-list{display:flex;flex-direction:column;gap:10px}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;transition:border-color .2s}
.hist-item:hover{border-color:var(--accent)}
.hist-left{display:flex;flex-direction:column;gap:3px}
.hist-name{font-size:14px;font-weight:500;color:var(--text)}
.hist-meta{font-size:12px;color:var(--muted)}
.hist-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.5px}
.badge-prime{background:var(--gold);color:#0E161F}
.badge-sbc{background:var(--accent);color:#fff}
.badge-select{background:var(--accent);color:#fff}
.hist-right{display:flex;gap:8px;align-items:center}
.btn-regen{padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.btn-regen:hover{border-color:var(--accent);color:var(--accent)}
.clear-btn{background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:4px 8px;transition:color .2s}
.clear-btn:hover{color:#e05555}
</style>
</head>
<body>
<header>
  <h1>Gerador de Assinaturas</h1>
  <p>Contclaro &mdash; Prime &middot; SBC &middot; Select</p>
</header>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('gerador',this)">Gerador</button>
  <button class="nav-btn" onclick="showPage('historico',this)">Histórico</button>
</div>

<div class="container">
  <!-- GERADOR -->
  <div class="page active" id="page-gerador">
    <div class="card">
      <div class="section-label">Unidade</div>
      <div class="tabs">
        <button class="tab active-prime" id="tab-prime" onclick="setUnidade('prime',this)">Prime</button>
        <button class="tab" id="tab-sbc" onclick="setUnidade('sbc',this)">SBC</button>
        <button class="tab" id="tab-select" onclick="setUnidade('select',this)">Select</button>
      </div>
      <div class="section-label">Dados</div>
      <div class="grid">
        <div class="field"><label>Nome completo</label><input id="nome" placeholder="Ex: João Silva" oninput="autoPreview()"></div>
        <div class="field"><label>Departamento</label><input id="depto" placeholder="Ex: Depto Tributário" oninput="autoPreview()"></div>
        <div class="field full"><label>E-mail</label><input id="email" type="email" placeholder="nome@contclaro.com.br" oninput="autoPreview()"></div>
      </div>
      <div class="field" style="margin-bottom:14px"><label>WhatsApp principal</label><input id="tel1" placeholder="+55 11 99999-9999" oninput="autoPreview()"></div>
      <div class="toggle-row">
        <button class="toggle" id="tog2" onclick="toggleTel2()"></button>
        <span class="toggle-label">Adicionar segundo WhatsApp</span>
      </div>
      <div id="tel2-wrap" style="display:none;margin-bottom:14px">
        <div class="field"><label>WhatsApp secundário</label><input id="tel2" placeholder="+55 11 88888-8888" oninput="autoPreview()"></div>
      </div>
      <button class="btn-gen" onclick="gerar()">Gerar assinatura</button>
    </div>

    <div class="card preview-area" id="prev-area">
      <div class="section-label">Prévia</div>
      <div class="preview-wrap">
        <div id="prev-wrap"></div>
      </div>
      <div class="btn-row">
        <button class="btn-sec" onclick="copiar()">Copiar HTML</button>
        <button class="btn-sec" onclick="baixar()">Baixar .html</button>
        <button class="btn-png" id="btn-png" onclick="baixarPNG()">⬇ Baixar PNG</button>
      </div>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div class="page" id="page-historico">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div class="section-label" style="margin-bottom:0">Assinaturas geradas</div>
        <button class="clear-btn" onclick="limparHistorico()">Limpar tudo</button>
      </div>
      <div id="hist-container"><div class="history-empty">Nenhuma assinatura gerada ainda.</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Hidden render area for PNG export -->
<div id="render-area" style="position:fixed;left:-9999px;top:0;"></div>

function gerar(auto){
  document.getElementById("prev-wrap").innerHTML=buildHTML();
  const a=document.getElementById("prev-area");
  a.classList.add("visible");
  if(!auto)a.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function copiar(){
  navigator.clipboard.writeText(buildHTML()).then(()=>showToast("HTML copiado!"));
}

function baixar(){
  const nome=document.getElementById("nome").value||"assinatura";
  const blob=new Blob(["<!DOCTYPE html><html><head><meta charset=UTF-8></head><body>"+buildHTML()+"</body></html>"],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=nome.replace(/\s+/g,"_")+"_assinatura.html";
  a.click();
}

async function baixarPNG(){
  const nome=document.getElementById("nome").value||"assinatura";
  const btn=document.getElementById("btn-png");
  btn.disabled=true;
  btn.textContent="Gerando...";

  const renderArea=document.getElementById("render-area");
  renderArea.innerHTML=buildHTML();
  const el=renderArea.firstChild;

  try{
    await new Promise(r=>setTimeout(r,300));
    const canvas=await html2canvas(el,{
      scale:2,
      useCORS:true,
      allowTaint:true,
      backgroundColor:null,
      logging:false
    });
    canvas.toBlob(blob=>{
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download=nome.replace(/\s+/g,"_")+"_assinatura.png";
      a.click();
      salvarHistorico(nome);
      showToast("PNG baixado!");
      btn.disabled=false;
      btn.textContent="⬇ Baixar PNG";
    },"image/png");
  }catch(e){
    showToast("Erro ao gerar PNG");
    btn.disabled=false;
    btn.textContent="⬇ Baixar PNG";
  }
  renderArea.innerHTML="";
}

function salvarHistorico(nome){
  const depto=document.getElementById("depto").value||"";
  const entry={
    id:Date.now(),
    nome,
    depto,
    unidade,
    data:new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})
  };
  historico.unshift(entry);
  if(historico.length>50)historico=historico.slice(0,50);
  localStorage.setItem("sig_historico",JSON.stringify(historico));
}

function renderHistorico(){
  const c=document.getElementById("hist-container");
  if(!historico.length){
    c.innerHTML='<div class="history-empty">Nenhuma assinatura gerada ainda.</div>';
    return;
  }
  c.innerHTML='<div class="history-list">'+historico.map(h=>`
    <div class="hist-item">
      <div class="hist-left">
        <span class="hist-name">${h.nome}</span>
        <span class="hist-meta">${h.depto} &middot; ${h.data}</span>
      </div>
      <div class="hist-right">
        <span class="hist-badge badge-${h.unidade}">${h.unidade.toUpperCase()}</span>
        <button class="btn-regen" onclick="recarregar(${h.id})">Reabrir</button>
      </div>
    </div>`).join('')+'</div>';
}

function recarregar(id){
  const h=historico.find(x=>x.id===id);
  if(!h)return;
  document.getElementById("nome").value=h.nome;
  document.getElementById("depto").value=h.depto;
  unidade=h.unidade;
  document.querySelectorAll(".tab").forEach(t=>t.className="tab");
  document.getElementById("tab-"+h.unidade).className="tab active-"+h.unidade;
  showPage("gerador",document.querySelectorAll(".nav-btn")[0]);
  gerar();
}

function limparHistorico(){
  if(!confirm("Limpar todo o histórico?"))return;
  historico=[];
  localStorage.setItem("sig_historico","[]");
  renderHistorico();
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}
</script>
